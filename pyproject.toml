[project]
name = "lpp-calendar"
version = "0.1.0"
description = "Calendar converter for MTG French Pauper events"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "icalendar>=7.1.2",
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
]

[dependency-groups]
dev = [
    "black>=26.5.1",
    "isort>=8.0.1",
    "ruff>=0.15.16",
]
